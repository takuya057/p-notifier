name: Payment Notifier Failover

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: payment-notifier
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor (skip if Mac instance updated within 10min)
        env:
          GACHA_EMAIL: ${{ secrets.GACHA_EMAIL }}
          GACHA_PASSWORD: ${{ secrets.GACHA_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FAILOVER_GRACE_SECONDS: "600"
        run: python monitor.py

      - name: Commit updated state.json
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git pull --rebase --autostash
            git add state.json
            git commit -m "chore: GHA update state"
            git push
          fi
